<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Can of Words</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overscroll-behavior: none;
  touch-action: none;
}

body {
  font-family: Chicago, Geneva, system-ui, sans-serif;
  background: #d6d6d6;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 14px;
}

@media (max-width: 480px) {
  body { padding-top: 10px; }
}

:root { --ui-scale: 1; }
@media (max-width: 480px) { :root { --ui-scale: 1.25; } }
@media (max-width: 360px) { :root { --ui-scale: 1.35; } }

/* ===== TITLE ===== */
h1 {
  font-size: 22px;
  margin: 4px 0 2px 0;
}

#clue {
  font-size: 12px;
  opacity: 0.7;
  margin-bottom: 6px;
}

/* ===== CONTROLS ===== */
.controls {
  margin-bottom: 6px;
}

button {
  font-family: inherit;
  font-size: 13px;
  padding: 4px 10px;
  background: #e6e6e6;
  border-top: 2px solid #fff;
  border-left: 2px solid #fff;
  border-right: 2px solid #7a7a7a;
  border-bottom: 2px solid #7a7a7a;
}

button:disabled { opacity: 0.5; }

/* ===== GRID ===== */
.frame {
  transform: scale(var(--ui-scale));
  transform-origin: top center;
  padding: 8px;
  background: #e6e6e6;
  border-top: 3px solid #fff;
  border-left: 3px solid #fff;
  border-right: 3px solid #7a7a7a;
  border-bottom: 3px solid #7a7a7a;
}

.grid {
  display: grid;
  grid-template-columns: repeat(7, 44px);
  grid-template-rows: repeat(7, 44px);
}

.cell {
  width: 44px;
  height: 44px;
  background: #e6e6e6;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: bold;
  user-select: none;
  position: relative;
}

.cell.selected {
  z-index: 3;
  box-shadow:
    inset 1px 1px 0 #fff,
    inset -1px -1px 0 rgba(0,0,0,.35),
    0 2px 2px rgba(0,0,0,.35);
}

/* Next available letter hint */
.cell.next-hint {
  background: #dcdcdc;
  box-shadow: inset 0 0 0 2px rgba(0,0,0,0.1);
}

/* ===== SENTENCE ===== */
.sentence {
  margin-top: 18px;
  text-align: center;
}

.sentence-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 6px;
}

.word {
  display: inline-flex;
  margin: 0 4px 4px 4px;
}

.sentence .cell {
  width: 30px;
  height: 30px;
  font-size: 14px;
}

/* ===== WIN ===== */
@keyframes successPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.12); }
  100% { transform: scale(1); }
}

.cell.success {
  animation: successPop 400ms ease-out forwards;
}

body.solved .cell:not(.selected) {
  opacity: 0.35;
}
</style>
</head>

<body>

<h1>Can of Words</h1>
<div id="clue"></div>

<div class="controls">
  <button id="undoBtn">undo</button>
</div>

<div class="frame">
  <div id="grid" class="grid"></div>
</div>

<div class="sentence">
  <strong>Your sentence:</strong>
  <div id="sentenceRow" class="sentence-row"></div>
</div>

<script>
/* ================================
   PUZZLE CONFIG
   ================================ */

const COLORS = [
  '#f8bbd0','#b9f6ca','#ffe082',
  '#9bdcff','#ffcc80','#d1c4e9','#d7c4a0'
];

const PUZZLE = {
  clue: 'Robin',
  sentence: 'sidekick to the superhero Batman'
};

const wordCount = PUZZLE.sentence.trim().split(/\s+/).length;
document.getElementById('clue').textContent =
  `Today's answer: ${PUZZLE.clue} (${wordCount})`;

const LETTERS = PUZZLE.sentence.replaceAll(' ', '');

/* ================================
   RNG + PATH
   ================================ */

function rng(seed){
  return () => ((seed = (seed * 1664525 + 1013904223) >>> 0) / 4294967296);
}

function genPath(len){
  const r = rng(Date.now());
  while(true){
    let used = new Set(), path = [];
    let x = (r()*7)|0, y = (r()*7)|0;
    path.push([x,y]); used.add(x+','+y);
    let ok = true;
    for(let i=1;i<len;i++){
      let opts=[[1,0],[-1,0],[0,1],[0,-1]].filter(d=>{
        let nx=x+d[0], ny=y+d[1];
        return nx>=0&&ny>=0&&nx<7&&ny<7&&!used.has(nx+','+ny);
      });
      if(!opts.length){ ok=false; break; }
      let [dx,dy]=opts[(r()*opts.length)|0];
      x+=dx; y+=dy;
      path.push([x,y]);
      used.add(x+','+y);
    }
    if(ok) return path;
  }
}

/* ================================
   GRID
   ================================ */

const PATH = genPath(LETTERS.length);
let grid = Array.from({length:7},()=>Array(7).fill(''));
PATH.forEach((p,i)=>grid[p[0]][p[1]]=LETTERS[i]);

const alpha='abcdefghijklmnopqrstuvwxyz', filler=rng(999);
for(let r=0;r<7;r++)for(let c=0;c<7;c++)
  if(!grid[r][c]) grid[r][c]=alpha[(filler()*26)|0];

const gridEl = document.getElementById('grid');
const rowEl  = document.getElementById('sentenceRow');
const undoBtn = document.getElementById('undoBtn');

/* ================================
   STATE
   ================================ */

let words=[], drag=[], done=false;

undoBtn.onclick = () => {
  if(words.length && !done){
    words.pop();
    redraw();
  }
};

/* ================================
   BUILD
   ================================ */

function build(){
  gridEl.innerHTML='';
  grid.forEach((row,r)=>row.forEach((l,c)=>{
    const d=document.createElement('div');
    d.className='cell';
    d.textContent=l.toUpperCase();
    d.dataset.r=r;
    d.dataset.c=c;
    d.onpointerdown=start;
    gridEl.appendChild(d);
  }));
}

/* ================================
   RENDER (LOCKED)
   ================================ */

function redraw(){
  document.querySelectorAll('.cell').forEach(c=>{
    c.className='cell';
    c.style.background='#e6e6e6';
    c.style.borderRadius='0';
  });

  function applyWorm(cells, color){
    cells.forEach((c,i)=>{
      c.classList.add('selected');
      c.style.background=color;

      const prev = cells[i-1];
      const next = cells[i+1];

      if(!prev || !next){
        c.style.borderRadius='50%';
        return;
      }

      const dr1 = c.dataset.r - prev.dataset.r;
      const dc1 = c.dataset.c - prev.dataset.c;
      const dr2 = next.dataset.r - c.dataset.r;
      const dc2 = next.dataset.c - c.dataset.c;

      c.style.borderRadius = (dr1===dr2 || dc1===dc2)
        ? '50%' : '50%';
    });
  }

  words.forEach((w,i)=>applyWorm(w.cells, COLORS[i%COLORS.length]));
  if(drag.length)
    applyWorm(drag, COLORS[words.length%COLORS.length]);

  // Next letter hints
  if(words.length && !done){
    const last = words.at(-1).cells.at(-1);
    const used = new Set(
      words.flatMap(w => w.cells.map(
        c => c.dataset.r+','+c.dataset.c))
    );
    document.querySelectorAll('.cell').forEach(c=>{
      const key=c.dataset.r+','+c.dataset.c;
      if(!used.has(key) && adj(c,last))
        c.classList.add('next-hint');
    });
  }

  rowEl.innerHTML='';
  words.forEach((w,i)=>{
    const we=document.createElement('div');
    we.className='word';
    w.text.split('').forEach(ch=>{
      const c=document.createElement('div');
      c.className='cell selected';
      c.style.background=COLORS[i%COLORS.length];
      c.textContent=ch.toUpperCase();
      we.appendChild(c);
    });
    rowEl.appendChild(we);
  });
}

/* ================================
   INPUT
   ================================ */

function adj(a,b){
  return Math.abs(a.dataset.r-b.dataset.r)+
         Math.abs(a.dataset.c-b.dataset.c)===1;
}

function start(e){
  if(done) return;
  const c=e.target;
  if(words.length && !adj(c, words.at(-1).cells.at(-1))) return;
  drag=[c];
  gridEl.onpointermove=move;
  document.onpointerup=end;
  redraw();
}

function move(e){
  const t=document.elementFromPoint(e.clientX,e.clientY);
  if(!t||!t.classList.contains('cell')) return;
  if(drag.length>1 && t===drag[drag.length-2]){
    drag.pop(); redraw(); return;
  }
  if(drag.includes(t)||!adj(drag.at(-1),t)) return;
  drag.push(t); redraw();
}

function end(){
  document.onpointerup=null;
  gridEl.onpointermove=null;
  if(drag.length){
    words.push({
      cells:[...drag],
      text:drag.map(c=>c.textContent.toLowerCase()).join('')
    });
  }
  drag=[];
  redraw();
  checkCompletion();
}

/* ================================
   SOLVE
   ================================ */

function checkCompletion(){
  const player = words.map(w=>w.text).join(' ')
    .replace(/\s+/g,' ').trim().toLowerCase();
  const target = PUZZLE.sentence
    .replace(/\s+/g,' ').trim().toLowerCase();

  if(player===target && !done){
    done=true;
    undoBtn.disabled=true;
    document.body.classList.add('solved');
    words.flatMap(w=>w.cells)
      .forEach((c,i)=>setTimeout(
        ()=>c.classList.add('success'),i*30));
  }
}

build();
redraw();
</script>

</body>
</html>
