<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
/>

<title>Can of Words 🪱</title>

<style>
/* ===============================
   GLOBAL
   =============================== */

html, body {
  margin: 0;
  padding: 0;
  overscroll-behavior: none;
  touch-action: none;
}

body {
  font-family: Chicago, Geneva, system-ui, sans-serif;
  background: #d6d6d6;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

/* Mobile: shave only top spacing (SAFE) */
@media (max-width: 480px) {
  body {
    padding-top: 12px;
    padding-bottom: 20px;
  }
}

:root { --ui-scale: 1; }
@media (max-width: 480px) { :root { --ui-scale: 1.25; } }
@media (max-width: 360px) { :root { --ui-scale: 1.35; } }

/* ===============================
   TOP BAR (SAFE – grid-aligned only)
   =============================== */

.top-bar {
  width: calc(7 * 44px + 16px); /* grid width + frame padding */
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 6px;
}

.title-group {
  display: flex;
  flex-direction: column;
}

.game-title {
  font-size: 20px;
  font-weight: bold;
  line-height: 1;
}

.subtitle {
  font-size: 14px;
  opacity: 0.9;
  margin-top: 3px;
}

button {
  font-family: Chicago, Geneva, system-ui, sans-serif;
  font-size: 13px;
  padding: 4px 10px;
  background: #e6e6e6;
  border-top: 2px solid #fff;
  border-left: 2px solid #fff;
  border-right: 2px solid #7a7a7a;
  border-bottom: 2px solid #7a7a7a;
}

button:disabled {
  opacity: 0.5;
}

/* ===============================
   FRAME + GRID (UNCHANGED STRUCTURE)
   =============================== */

.frame {
  transform: scale(var(--ui-scale));
  transform-origin: top center;
  padding: 8px;
  background: #e6e6e6;
  border-top: 3px solid #fff;
  border-left: 3px solid #fff;
  border-right: 3px solid #7a7a7a;
  border-bottom: 3px solid #7a7a7a;
}

.grid {
  display: grid;
  grid-template-columns: repeat(7, 44px);
  grid-template-rows: repeat(7, 44px);
}

.cell {
  width: 44px;
  height: 44px;
  background: #e6e6e6;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: bold;
  user-select: none;
  touch-action: none;
  position: relative;
  z-index: 1;
}

.cell.selected {
  z-index: 3;
  box-shadow:
    inset 1px 1px 0 #fff,
    inset -1px -1px 0 rgba(0,0,0,.35),
    0 2px 2px rgba(0,0,0,.35);
}

/* ===============================
   SENTENCE DISPLAY
   =============================== */

.sentence {
  margin-top: 22px;
  max-width: 660px;
  text-align: center;
}

.sentence-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 6px;
}

.word {
  display: inline-flex;
  white-space: nowrap;
  margin: 0 4px 4px 4px;
}

.sentence .cell {
  width: 30px;
  height: 30px;
  font-size: 14px;
}

/* ===============================
   WIN CELEBRATION (TIERS 1–3)
   =============================== */

@keyframes boardPulse {
  0%   { transform: scale(var(--ui-scale)); }
  40%  { transform: scale(calc(var(--ui-scale) * 1.03)); }
  100% { transform: scale(var(--ui-scale)); }
}

@keyframes successPop {
  0% {
    filter: brightness(1);
    transform: scale(1);
  }
  40% {
    filter: brightness(1.25);
    transform: scale(1.08);
  }
  100% {
    filter: brightness(1);
    transform: scale(1);
  }
}

.cell.success {
  animation: successPop 450ms ease-out forwards;
}

body.solved .cell:not(.selected) {
  opacity: 0.35;
}
</style>
</head>

<body>

<!-- ===== TOP BAR ===== -->

<div class="top-bar">
  <div class="title-group">
    <div class="game-title">Can of Words</div>
    <div id="clue" class="subtitle"></div>
  </div>
  <button id="undoBtn">undo</button>
</div>

<!-- ===== GRID ===== -->

<div class="frame">
  <div id="grid" class="grid"></div>
</div>

<!-- ===== SENTENCE ===== -->

<div class="sentence">
  <strong>Your sentence:</strong>
  <div id="sentenceRow" class="sentence-row"></div>
</div>

<script>
/* ======================================================
   PUZZLE CONFIG
   ====================================================== */

const COLORS = [
  '#f8bbd0','#b9f6ca','#ffe082',
  '#9bdcff','#ffcc80','#d1c4e9','#d7c4a0'
];

const PUZZLE = {
  clue: 'Robin',
  sentence: 'sidekick to the superhero Batman'
};

const wordCount = PUZZLE.sentence.trim().split(/\s+/).length;
document.getElementById('clue').textContent =
  `Today's answer: ${PUZZLE.clue} (${wordCount})`;

const LETTERS = PUZZLE.sentence.replaceAll(' ', '');

/* ======================================================
   RNG + PATH
   ====================================================== */

function rng(seed){
  return () => ((seed = (seed * 1664525 + 1013904223) >>> 0) / 4294967296);
}

function genPath(len){
  const r = rng(Date.now());
  while(true){
    let used = new Set(), path = [];
    let x = (r()*7)|0, y = (r()*7)|0;
    path.push([x,y]); used.add(x+','+y);
    let ok = true;
    for(let i=1;i<len;i++){
      let opts=[[1,0],[-1,0],[0,1],[0,-1]].filter(d=>{
        let nx=x+d[0], ny=y+d[1];
        return nx>=0&&ny>=0&&nx<7&&ny<7&&!used.has(nx+','+ny);
      });
      if(!opts.length){ ok=false; break; }
      let [dx,dy]=opts[(r()*opts.length)|0];
      x+=dx; y+=dy;
      path.push([x,y]);
      used.add(x+','+y);
    }
    if(ok) return path;
  }
}

/* ======================================================
   GRID BUILD
   ====================================================== */

const PATH = genPath(LETTERS.length);
let grid = Array.from({length:7},()=>Array(7).fill(''));
PATH.forEach((p,i)=>grid[p[0]][p[1]]=LETTERS[i]);

const alpha='abcdefghijklmnopqrstuvwxyz', filler=rng(999);
for(let r=0;r<7;r++)for(let c=0;c<7;c++)
  if(!grid[r][c]) grid[r][c]=alpha[(filler()*26)|0];

const gridEl = document.getElementById('grid');
const rowEl  = document.getElementById('sentenceRow');
const undoBtn = document.getElementById('undoBtn');

/* ======================================================
   GAME STATE
   ====================================================== */

let words = [];
let drag = [];
let done = false;

undoBtn.onclick = () => {
  if(words.length && !done){
    words.pop();
    redraw();
  }
};

/* ======================================================
   RENDERING
   ====================================================== */

function build(){
  gridEl.innerHTML='';
  grid.forEach((row,r)=>row.forEach((l,c)=>{
    const d=document.createElement('div');
    d.className='cell';
    d.textContent=l.toUpperCase();
    d.dataset.r=r;
    d.dataset.c=c;
    d.onpointerdown=start;
    gridEl.appendChild(d);
  }));
}

function redraw(){
  document.querySelectorAll('.cell').forEach(c=>{
    c.className='cell';
    c.style.background='#e6e6e6';
    c.style.borderRadius='0';
  });

  function applyWorm(cells, color){
    cells.forEach((c,i)=>{
      c.classList.add('selected');
      c.style.background=color;

      if(cells.length === 1){
        c.style.borderRadius = '50%';
        return;
      }

      const prev = cells[i-1];
      const next = cells[i+1];

      if(!prev || !next){
        // head or tail
        c.style.borderRadius = '50%';
        return;
      }

      const dr1 = c.dataset.r - prev.dataset.r;
      const dc1 = c.dataset.c - prev.dataset.c;
      const dr2 = next.dataset.r - c.dataset.r;
      const dc2 = next.dataset.c - c.dataset.c;

      // straight segment
      if(dr1 === dr2 || dc1 === dc2){
        c.style.borderRadius = '50%';
      } else {
        // corner segment
        c.style.borderRadius = '50%';
      }
    });
  }

  words.forEach((w,i)=>applyWorm(w.cells, COLORS[i % COLORS.length]));
  if(drag.length){
    applyWorm(drag, COLORS[words.length % COLORS.length]);
  }

  // sentence row rendering unchanged
}

  function applyWorm(cells, color){
    cells.forEach(c=>{
      c.classList.add('selected');
      c.style.background=color;
    });
  }

  words.forEach((w,i)=>applyWorm(w.cells, COLORS[i%COLORS.length]));
  if(drag.length) applyWorm(drag, COLORS[words.length%COLORS.length]);

  rowEl.innerHTML='';
  words.forEach((w,i)=>{
    const we=document.createElement('div');
    we.className='word';
    w.text.split('').forEach(ch=>{
      const c=document.createElement('div');
      c.className='cell selected';
      c.style.background=COLORS[i%COLORS.length];
      c.textContent=ch.toUpperCase();
      we.appendChild(c);
    });
    rowEl.appendChild(we);
  });
}

/* ======================================================
   INPUT
   ====================================================== */

function adj(a,b){
  return Math.abs(a.dataset.r-b.dataset.r)+Math.abs(a.dataset.c-b.dataset.c)==1;
}

function start(e){
  if(done) return;
  const c=e.target;
  if(words.length && !adj(c,words.at(-1).cells.at(-1))) return;
  drag=[c];
  gridEl.onpointermove=move;
  document.onpointerup=end;
  redraw();
}

function move(e){
  const t=document.elementFromPoint(e.clientX,e.clientY);
  if(!t||!t.classList.contains('cell')) return;
  if(drag.length>1 && t===drag[drag.length-2]){
    drag.pop(); redraw(); return;
  }
  if(drag.includes(t)||!adj(drag.at(-1),t)) return;
  drag.push(t); redraw();
}

function end(){
  document.onpointerup=null;
  gridEl.onpointermove=null;
  if(drag.length){
    words.push({
      cells:[...drag],
      text:drag.map(c=>c.textContent.toLowerCase()).join('')
    });
  }
  drag=[];
  redraw();
  checkCompletion();
}

/* ======================================================
   SOLVE CHECK (ROBUST)
   ====================================================== */

function checkCompletion(){
  const playerSentence = words
    .map(w => w.text)
    .join(' ')
    .replace(/\s+/g, ' ')
    .trim()
    .toLowerCase();

  const targetSentence = PUZZLE.sentence
    .replace(/\s+/g, ' ')
    .trim()
    .toLowerCase();

  if(playerSentence === targetSentence && !done){
    done = true;
    drag.length = 0;
    undoBtn.disabled = true;

    document.body.classList.add('solved');

    const frame = document.querySelector('.frame');
    frame.style.animation = 'boardPulse 450ms ease-out';

    words.flatMap(w => w.cells)
      .forEach((c,i) =>
        setTimeout(() => c.classList.add('success'), i * 30)
      );
  }
}

build();
redraw();
</script>

</body>
</html>
